name: Release

# Tag-driven release: `git tag v1.0.0 && git push origin v1.0.0`.
# Gates on the same checks as CI, then publishes the container image to
# ghcr.io and creates a GitHub release with the matching CHANGELOG section.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: docker.io/library/postgres:17-alpine
        env:
          POSTGRES_USER: vestigo
          POSTGRES_PASSWORD: vestigo
          POSTGRES_DB: vestigo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vestigo -d vestigo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        # glibc tag, not -alpine — see ci.yml's comment (musl startup path
        # trips the Actions seccomp profile and never boots).
        image: docker.io/clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        # No --health-cmd — see ci.yml's comment.
        image: docker.io/qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4

      - name: Wait for qdrant
        run: timeout 30 sh -c 'until curl -sf http://localhost:6333/healthz; do sleep 1; done'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Tag matches pyproject and package versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          pkg_version="$(uv run python -c 'import vestigo; print(vestigo.__version__)')"
          if [ "$tag" != "$version" ] || [ "$tag" != "$pkg_version" ]; then
            echo "Tag v$tag, pyproject $version, vestigo.__version__ $pkg_version must all match" >&2
            exit 1
          fi

      - name: Ruff lint
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  publish:
    name: Publish image + GitHub release
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vestigo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract CHANGELOG section
        # Pull the `## [X.Y.Z]` block for this tag out of CHANGELOG.md as the
        # release notes; fail loudly if the section is missing.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $version" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Vestigo $GITHUB_REF_NAME" \
            --notes-file release-notes.md
