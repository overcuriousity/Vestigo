# Reference deployment for TraceSignal: backing services plus the app itself.
# TraceSignal is a native Python/uv app and runs fine directly on the host (see README
# "Quick start") — the `app` service here is for operators who prefer one `docker compose up`
# to bring up everything, including building the app image from the local checkout.

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: tracesignal
      POSTGRES_PASSWORD: tracesignal
      POSTGRES_DB: tracesignal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracesignal -d tracesignal"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: docker.io/qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      TS_ENVIRONMENT: production
      TS_SECRET_KEY: change-me-in-production
      TS_POSTGRES_URL: postgresql+asyncpg://tracesignal:tracesignal@postgres:5432/tracesignal
      TS_CLICKHOUSE_URL: http://clickhouse:8123
      TS_CLICKHOUSE_DATABASE: tracesignal
      TS_QDRANT_URL: http://qdrant:6333
      TS_ALLOW_ONLINE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
  qdrant_data:


