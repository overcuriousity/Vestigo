# Reference deployment for the TraceSignal backing services (Postgres, ClickHouse, Qdrant).
# TraceSignal itself is a native Python/uv app and runs directly on the host (see README
# "Quick start"); uncomment the `app` service below for a containerized all-in-one instead.
#
# All published ports are bound to 127.0.0.1 on purpose: these services run with default or
# no credentials, so exposing them beyond loopback would let anyone with network reach bypass
# the app-layer RBAC entirely. To expose a service on the LAN, change its bind address AND
# set real credentials (e.g. the commented QDRANT__SERVICE__API_KEY below, a real
# POSTGRES_PASSWORD, and a ClickHouse user/password).

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: tracesignal
      POSTGRES_PASSWORD: tracesignal
      POSTGRES_DB: tracesignal
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracesignal -d tracesignal"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    # Pinned to an exact build for forensic reproducibility. >= 25.4 brings
    # lazy materialization (query_plan_optimize_lazy_materialization, default
    # on since 25.5), which keeps any remaining full-row ORDER BY ... LIMIT
    # query cheap server-side.
    image: docker.io/clickhouse/clickhouse-server:26.6.1.1193-alpine
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # >= 25.x images restrict the `default` user to localhost — see the
      # comment in the mounted file.
      # (`z` = SELinux relabel for rootless podman on Fedora; harmless on Docker)
      - ./deploy/clickhouse/allow-default-network.xml:/etc/clickhouse-server/users.d/zz-allow-default-network.xml:ro,z
    healthcheck:
      # clickhouse-client is bundled in the image and always present, unlike
      # wget/curl which vary across the alpine base and gave false negatives.
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  qdrant:
    image: docker.io/qdrant/qdrant:v1.18.2
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    # Uncomment to require an API key (must match TS_QDRANT_API_KEY on `app`):
    # environment:
    #   QDRANT__SERVICE__API_KEY: change-me
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EMBEDDINGS: "1"
    ports:
      - "8080:8080"
    environment:
      TS_ENVIRONMENT: production
      TS_LOG_LEVEL: INFO
      TS_ALLOW_ONLINE: "false"
      TS_POSTGRES_URL: postgresql+asyncpg://tracesignal:tracesignal@postgres:5432/tracesignal
      TS_CLICKHOUSE_URL: http://clickhouse:8123
      TS_CLICKHOUSE_DATABASE: tracesignal
      TS_CLICKHOUSE_USERNAME: default
      TS_CLICKHOUSE_PASSWORD: ""
      TS_QDRANT_URL: http://qdrant:6333
      # TS_QDRANT_API_KEY: change-me
      TS_QDRANT_COLLECTION_PREFIX: tracesignal
      TS_EMBEDDING_MODEL: all-MiniLM-L6-v2
      TS_EMBEDDING_DEVICE: cpu
      TS_EMBEDDING_BATCH_SIZE: 64
      TS_INGEST_BATCH_SIZE: 20000
      TS_MAX_UPLOAD_BYTES: 10737418240
      # Change this before any real/shared deployment — it's a one-time
      # bootstrap credential; the admin is forced to rotate it on first login.
      TS_ADMIN_USERNAME: admin
      TS_ADMIN_PASSWORD: change-me-on-first-login
      TS_LOGIN_BACKOFF_THRESHOLD: 5
      TS_LOGIN_BACKOFF_BASE_SECONDS: 2.0
      TS_LOGIN_BACKOFF_MAX_SECONDS: 300.0
      TS_SESSION_TTL_HOURS: 168
      TS_AUTH_COOKIE_NAME: tv_session
      # Set to true only when serving over HTTPS (e.g. behind a TLS reverse
      # proxy) — the cookie won't be sent over plain HTTP otherwise.
      TS_AUTH_COOKIE_SECURE: "false"
      TS_AUTH_COOKIE_SAMESITE: lax
      TS_AUDIT_ENABLED: "true"
      TS_OIDC_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
  qdrant_data:
