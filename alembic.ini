# Alembic configuration for TraceSignal's Postgres metadata schema.
#
# The database URL is NOT configured here — env.py always resolves it from
# the application settings (TS_POSTGRES_URL / core.config.get_settings), so
# CLI runs and the in-app startup upgrade can never disagree about the target.
#
# CLI usage (from repo root):
#   uv run alembic revision --autogenerate -m "describe change"
#   uv run alembic upgrade head
#   uv run alembic history

[alembic]
script_location = src/tracesignal/db/migrations
prepend_sys_path = src
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
