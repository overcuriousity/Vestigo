# Example TLS-terminating reverse proxy for TraceSignal.
# See docs/DEPLOYMENT_NGINX.md for setup instructions and rationale.
# Replace tracesignal.example.internal with your hostname and adjust
# cert paths to match wherever you generated/installed them.

server {
    listen 80;
    listen [::]:80;
    server_name tracesignal.example.internal;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tracesignal.example.internal;

    ssl_certificate     /etc/nginx/tls/tracesignal.crt;
    ssl_certificate_key /etc/nginx/tls/tracesignal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:TS_SSL:10m;
    ssl_session_timeout 10m;

    # Large ingests (Plaso CSV/JSONL uploads) can be big; raise the default 1m cap.
    client_max_body_size 200G;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookies must round-trip untouched.
        proxy_cookie_flags ~ secure samesite=lax;

        # Long-running ingest/embedding jobs and large uploads/downloads.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }

    # SSE endpoint (api/routers/stream.py, GET /api/cases/{id}/stream) — must not
    # be buffered/chunked-aggregated or analysts stop seeing live annotation/tag
    # updates until the buffer flushes. Scoped to the exact stream path with a
    # regex (regex locations take precedence over the `location /` prefix) so the
    # large source-upload endpoint (POST /api/cases/{id}/sources) and every other
    # /api/cases/* route keep the 300s body/send timeouts from `location /` — a
    # broad `location /api/cases/` would drop them to nginx's 60s defaults and
    # abort slow multi-GB uploads.
    location ~ ^/api/cases/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cookie_flags ~ secure samesite=lax;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }
}
